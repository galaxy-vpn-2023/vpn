name: Update VPN configs

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Make xray-knife executable
        run: chmod +x tools/xray-knife

      - name: Run updater
        run: dotnet run --project src/ConfigUpdater/ConfigUpdater.csproj

      - name: Commit output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add output/*.txt data/*.csv data/*.txt || true

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Auto update configs"
            git push
          fi
